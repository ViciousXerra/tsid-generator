name: Basic CI on pull request.

on:
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'src/**'
      - '.github/workflows/basic-pr-ci.yml'
      - 'pom.xml'

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Check code style
        run: ./mvnw checkstyle:check
  version_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Checkout base commit before merge
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
      - name: Evaluate project revision from base commit before merge
        id: base
        run: |
          BASE_REVISION=$(./mvnw help:evaluate -Dexpression=revision -q -DforceStdout)
          echo "base_revision=$BASE_REVISION" >> $GITHUB_OUTPUT
      - name: Checkout merged branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Evaluate project revision from head
        id: head
        run: |
          HEAD_REVISION=$(./mvnw help:evaluate -Dexpression=revision -q -DforceStdout)
          echo "head_revision=$HEAD_REVISION" >> $GITHUB_OUTPUT
      - name: Compare revisions
        id: compare
        run: |
          COMPARE_RESULT=$(/bin/bash .github/workflows/semver-compare.sh ${{ steps.base.outputs.base_revision }} ${{ steps.head.outputs.head_revision }})
          echo "compare_revision_result=$COMPARE_RESULT" >> $GITHUB_OUTPUT
      - name: Validate head revision
        if: steps.compare.outputs.compare_revision_result < 0
        run: |
          echo "Head revision ${{ steps.head.outputs.head_revision }} lesser than previous committed revision ${{ steps.base.outputs.base_revision }}"
          exit 1
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and test with Maven
        run: ./mvnw -B verify --file pom.xml
      - uses: madrapps/jacoco-report@v1.6.1
        if: ( github.event_name != 'workflow_dispatch' )
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Code Coverage
          update-comment: true
